services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-loom}
      POSTGRES_USER: ${DB_USER:-loom}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-loom}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      PYSTOW_HOME: /tmp/pystow
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready/', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  ontology-worker:
    build: .
    command: python manage.py process_ontology_loads --watch
    volumes:
      - .:/app
    environment:
      PYSTOW_HOME: /tmp/pystow
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
