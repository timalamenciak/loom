services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-loom}
      POSTGRES_USER: ${DB_USER:-loom}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-loom}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: python manage.py migrate --noinput
    volumes:
      - .:/opt/loom
      - loom_media:/opt/loom/media
      - loom_staticfiles:/opt/loom/staticfiles
    environment:
      PYSTOW_HOME: /tmp/pystow
      APP_DIR: /opt/loom
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/opt/loom
      - loom_media:/opt/loom/media
      - loom_staticfiles:/opt/loom/staticfiles
    ports:
      - "8000:8000"
    environment:
      PYSTOW_HOME: /tmp/pystow
      APP_DIR: /opt/loom
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready/', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  ontology-worker:
    build: .
    command: python manage.py process_ontology_loads --watch
    volumes:
      - .:/opt/loom
      - loom_media:/opt/loom/media
    environment:
      PYSTOW_HOME: /tmp/pystow
      APP_DIR: /opt/loom
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      disable: true

volumes:
  postgres_data:
  loom_media:
  loom_staticfiles:
