name: CI

on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: loom
          POSTGRES_PASSWORD: loom
          POSTGRES_DB: loom
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Dependency vulnerability scan
        run: pip install pip-audit && pip-audit
        continue-on-error: true

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Migration drift check
        env:
          SECRET_KEY: ci-test-key
          DB_HOST: localhost
          DB_NAME: loom
          DB_USER: loom
          DB_PASSWORD: loom
        run: python manage.py makemigrations --check --dry-run

      - name: Production deployment checks
        env:
          SECRET_KEY: ci-test-key-that-is-long-enough-for-django-deploy-checks-123456
          ALLOWED_HOSTS: localhost
          SECURE_HSTS_PRELOAD: "True"
        run: python manage.py check --deploy --fail-level WARNING --settings=loom.settings.prod

      - name: Type check (mypy)
        run: pip install mypy && mypy apps/ loom/ --ignore-missing-imports
        continue-on-error: true

      - name: Tests
        env:
          SECRET_KEY: ci-test-key
          DB_HOST: localhost
          DB_NAME: loom
          DB_USER: loom
          DB_PASSWORD: loom
        run: pytest --cov=apps --cov=loom --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
