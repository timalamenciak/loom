services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-loom}
      POSTGRES_USER: ${DB_USER:-loom}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    command: python manage.py migrate --noinput
    volumes:
      - loom_media:/opt/loom/media
    environment:
      DJANGO_SETTINGS_MODULE: loom.settings.prod
      PYSTOW_HOME: /tmp/pystow
      APP_DIR: /opt/loom
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    volumes:
      - loom_media:/opt/loom/media
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: loom.settings.prod
      PYSTOW_HOME: /tmp/pystow
      APP_DIR: /opt/loom
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready/', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  ontology-worker:
    build: .
    command: python manage.py process_ontology_loads --watch
    volumes:
      - loom_media:/opt/loom/media
    environment:
      DJANGO_SETTINGS_MODULE: loom.settings.prod
      PYSTOW_HOME: /tmp/pystow
      APP_DIR: /opt/loom
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      disable: true
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  loom_media:
