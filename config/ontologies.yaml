# ontologies.yaml — Ontology sources for Loom.
# Loaded by: python manage.py load_ontology <name>  (Phase 4)
#
# All sources are OBO-format URLs. The loader (apps/ontology) fetches,
# parses with pronto, and indexes terms into OntologyTerm under a new
# OntologySnapshot. Declare the full set here; preload a subset on boot.
#
# Optional per-entry branch scoping (root_terms + include_descendants):
# instead of indexing every term with a matching prefix, index only the
# named root CURIEs and their OBO subclasses. `source_sha256` still
# content-addresses the full downloaded file for reproducibility; only the
# *indexed* subset shrinks. Mirrors the seed-list/MIREOT pattern ELMO's own
# build uses to pull a slice of ENVO into itself (see
# https://github.com/timalamenciak/elmo/blob/main/src/ontology/imports/envo_terms.txt).

ontologies:
  - name: envo
    prefix: ENVO
    url: http://purl.obolibrary.org/obo/envo.obo
    description: "Environment Ontology"

  - name: elmo
    prefix: ELMO
    url: https://raw.githubusercontent.com/timalamenciak/elmo/e3ec16b/elmo.obo
    description: "Ecolink Model Ontology (ecosystem management processes, ecosystem types)"
    # Loom only autocompletes ELMO for entity_type=management_intervention,
    # which is exactly ELMO's active-ecosystem-management-process and
    # planned-environmental-usage-process branches. ELMO's ecosystem
    # functional group terms (used by CAMO's EcosystemFunctionalGroupEnum)
    # are baked into the schema enum directly, not looked up here, so they
    # don't need to be indexed.
    root_terms:
      - "ENVO:01001170"   # active ecosystem management process
      - "ENVO:01001436"   # planned environmental usage process
    include_descendants: true

  - name: pato
    prefix: PATO
    url: http://purl.obolibrary.org/obo/pato.obo
    description: "Phenotypic Quality Ontology"

  - name: go
    prefix: GO
    url: http://purl.obolibrary.org/obo/go.obo
    description: "Gene Ontology (biological process, molecular function, cellular component)"

  - name: chebi
    prefix: CHEBI
    url: http://purl.obolibrary.org/obo/chebi.obo
    description: "Chemical Entities of Biological Interest"

  - name: bfo
    prefix: BFO
    url: http://purl.obolibrary.org/obo/bfo.obo
    description: "Basic Formal Ontology"

  - name: ro
    prefix: RO
    url: http://purl.obolibrary.org/obo/ro.obo
    description: "Relations Ontology"

  - name: eco
    prefix: ECO
    url: http://purl.obolibrary.org/obo/eco.obo
    description: "Evidence & Conclusion Ontology"

# Preload on first boot (fast subset — full ontologies load on demand).
# Taxa are resolved live against Wikidata (see loom_ui.yaml wikidata_live),
# not cached locally, so no taxon ontology is preloaded here.
preload:
  - envo
  - elmo
  - pato
  - ro
