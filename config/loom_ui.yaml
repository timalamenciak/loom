# loom_ui.yaml — UI sidecar for the Loom annotation workbench.
# Augments the active CAMO LinkML schema without editing it.
#
# Layer grouping: which CausalEdge slots appear in each UI layer section.
#   Slots not listed in any layer AND not in globally_hidden_slots appear
#   in an auto-generated "Other" layer (collapsed).
# Ontology routing: which ontology prefix(es) to prefer per slot.
# Widget overrides: non-default widget type for a specific slot.
# Globally hidden: slots excluded from annotation forms for all projects.

layers:
  - id: layer1
    label: "Layer 1: Claim & Predicate"
    collapsed_by_default: false
    slots:
      - predicate
      - claim_strength
      - negated
      - original_sentence

  - id: layer_context
    label: "ELMO Context"
    collapsed_by_default: false
    slots:
      - ecosystem_context

  - id: layer2
    label: "Layer 2: Philosophical Account"
    collapsed_by_default: false
    slots:
      - philosophical_accounts

  - id: layer3
    label: "Layer 3: Causal Features"
    collapsed_by_default: true
    slots:
      - necessity
      - sufficiency
      - direction
      - temporal_ordering
      - mediation
      - moderation
      - strength
      - specificity
      - stability
      - token_or_type
      - determinism
      - proximate_distal
      - contributing_sole
      - reversibility
      - proportionality
      - context_dependence
      - temporal_extent

  - id: layer4
    label: "Layer 4: Evidential Basis"
    collapsed_by_default: false
    slots:
      - evidential_basis
      - annotation_confidence
      - annotation_notes

# slot_name routing can be one of three shapes:
#   - list of bare prefix strings: uses only local OntologyTerm rows
#   - dict with optional "prefixes" list and/or "wikidata_live" object:
#       prefixes: [ENVO]             # local prefixes (omit if local-only isn't wanted)
#       wikidata_live:
#         root_qid: "Q16521"          # optional — restrict to descendants of this taxon
#                                     # omit root_qid to allow any Wikidata entity
#     "wikidata_live" is distinct from adding "WD" as a regular prefix.  A "WD"
#     prefix would imply a pre-loaded local OntologyTerm set; wikidata_live triggers
#     a live two-step API call (wbsearchentities → SPARQL filter).
#   - dict keyed on a sibling slot's enum value (conditional routing):
#       condition_slot: entity_type   # sibling slot on the same class
#       routes:
#         <permissible_value>: <one of the two shapes above>
#       default: <one of the two shapes above>   # used when the sibling is unset/unmatched
#     The widget reads the current value of condition_slot client-side and
#     re-queries with that route's prefixes/wikidata_live whenever it changes.
#     "allow_free_text: true" lets the annotator submit typed text that matched
#     no term; the UI then prompts them to name which ontology it should be
#     proposed to (see apps/ontology's OntologyTermSuggestion).
ontology_routing:
  entity_term:
    condition_slot: entity_type
    allow_free_text: true
    routes:
      taxon:
        wikidata_live:
          root_qid: "Q16521"   # taxon — any organism or taxonomic group
      management_intervention:
        prefixes: [ELMO]
      environmental_process:
        prefixes: [ENVO]
      environmental_variable:
        prefixes: [ELMO, ENVO]
    default:
      prefixes: [ENVO]
      wikidata_live:
        root_qid: "Q16521"
  # applied_to uses the same conditional entity_type → entity_term routing as
  # the node-level entity_term field; the applied_to_list widget reads this
  # via data-ontology-routes and re-queries the autocomplete per entry.
  applied_to:
    condition_slot: entity_type
    allow_free_text: true
    routes:
      taxon:
        wikidata_live:
          root_qid: "Q16521"
      management_intervention:
        prefixes: [ELMO]
      environmental_process:
        prefixes: [ENVO]
      environmental_variable:
        prefixes: [ELMO, ENVO]
    default:
      prefixes: [ENVO]
      wikidata_live:
        root_qid: "Q16521"
  measured_attribute:
    prefixes: [PATO]
    allow_free_text: true
  taxonomic_scope:
    allow_free_text: true
    wikidata_live:
      root_qid: "Q16521"   # taxon — any organism or taxonomic group
  ecosystem_context:
    prefixes: [ENVO]
    wikidata_live:
      root_qid: "Q87167"   # ecosystem

# slot_name: widget_type  (overrides schema_engine widget detection)
# study_coordinates is a multivalued, class-ranged slot (range: StudyCoordinates,
# inlined_as_list) — it cannot use "textarea" (a flat scalar widget); doing so
# posts a plain string where the form binder requires nested
# study_coordinates__<index>__latitude / __longitude fields, which fails
# validation. "coordinate_list" is a dedicated widget (see form_field.html and
# static/js/coordinate-list.js) that lets an annotator enter "lat,lng", save it
# as one entry in the multivalued list, and see previously saved entries.
widget_overrides:
  original_sentence: textarea
  annotation_notes: textarea
  pathway_description: textarea
  study_temporal_note: textarea
  study_sample_size: textarea
  study_coordinates: coordinate_list
  applied_to: applied_to_list

# Which sibling scalar slots a coordinate_list widget should auto-fill from a
# GeoNames reverse-geocode lookup after a location is saved. Keyed by the
# coordinate_list slot name so schema_engine never hardcodes study_country /
# study_state_or_province directly.
geonames_autofill:
  study_coordinates:
    country_slot: study_country
    state_slot: study_state_or_province

# GeoNames API configuration
# Set LOOM_GEONAMES_USERNAME in the environment to enable automatic
# country/state lookup from coordinates (see loom/settings/base.py's
# GEONAMES_USERNAME). Otherwise, users can manually enter study_country and
# study_state_or_province.

# Slots excluded from annotation forms for all projects.
# Pipeline-computed, system-managed, or UI-unsupported slots go here.
# Applied by schema_engine.form_spec() before layer assignment.
globally_hidden_slots:
  - id                   # auto-generated by Loom; never shown as an editable field
  - fcm_weight
  - fcm_weight_source
  - annotator
  - annotation_timestamp
  - source_document      # managed at graph level via SourceDocument form, not per-edge

# Per-slot help text shown as placeholder / hint in the annotation form.
# Supplements or replaces the LinkML schema description in the UI.
slot_help_text:
  name: "Composed label — e.g. 'Increased Euphorbia esula abundance'"
  description: "Author's exact phrasing for this entity (leave blank if name suffices)"
