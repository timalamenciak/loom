## =============================================================================
## Causal Mosaic Ontology - LinkML Schema
## =============================================================================
## Merges: Ecolink Model Ontology (ELM; ontology implementation of the ELM
##         pattern) for ecological entity
##         structure with Illari & Russo's (2014) causal mosaic framework for
##         rich causal annotation. ELM provides the entity layer (environmental
##         variables, processes, taxa decomposed into entity + attribute +
##         direction). The Causal Mosaic provides the causal semantics layer
##         (philosophical accounts, 15 causal features, evidential basis).
##
## Designed to support multiple renderings from a single canonical graph:
##   - Rosetta Statements (template-based NL rendering)
##   - Fuzzy Cognitive Maps and other causal models
##   - Evidence Gap Maps (intervention × outcome matrices)
##   - Retrieval-Augmented Generation (RAG)
##   - Causal diagrams, practitioner summaries, and future formats
##
## Key design principle: Causation in ecology is always between CHANGES IN
## STATE, not between things. A taxon does not cause anything; a change in
## an attribute of a taxon-linked variable does. Nodes therefore decompose
## into entity (what thing) + attribute (what measurable property) + direction
## (which way it changed), following ELM's qualifier pattern.
##
## Schema version: 0.4.0
## =============================================================================

id: https://w3id.org/causal-mosaic
name: causal-mosaic
title: Causal Mosaic Ontology for Ecological Evidence Synthesis
description: >-
  A unified schema merging the Ecolink Model (ELM) entity structure
  with the Illari-Russo causal mosaic annotation framework as formalized in
  CAMO. ELM provides the ecological entity layer: environmental variables,
  processes, and taxa are represented as nodes decomposed into entity +
  measurable attribute + direction of change, with qualifier slots for
  ecosystem context, process context, and conditioning variables. CAMO provides
  the causal semantics layer: each edge carries four annotation layers
  encoding claim strength, philosophical account of causation, fifteen causal
  features, and evidential basis. Together, they produce a labeled property
  graph that can be rendered into Rosetta Statements, Fuzzy Cognitive Maps,
  Evidence Gap Maps, RAG indices, and practitioner summaries. Where ELMO asks
  "what is related to what, and in what context?", CAMO asks "how do we know
  this is causal, what kind of causation is claimed, and how confident should
  we be?"

license: CC0
version: 0.4.1

see_also:
  - https://doi.org/10.1007/978-3-032-06136-2_33  # Alamenciak et al. 2025 ELM paper
  - https://global.oup.com/academic/product/causality-9780199662678  # Illari & Russo 2014

