  # ---------------------------------------------------------------------------
  # Document section (for RAG retrieval)
  # ---------------------------------------------------------------------------

  DocumentSectionEnum:
    description: "Sections of a source document where a causal claim may appear."
    permissible_values:
      title:
        description: "Paper title."
      abstract:
        description: "Abstract."
      introduction:
        description: "Introduction or background."
      methods:
        description: "Methods or materials section."
      results:
        description: "Results section."
      discussion:
        description: "Discussion section."
      conclusion:
        description: "Conclusion."
      supplementary:
        description: "Supplementary materials."

  # ---------------------------------------------------------------------------
  # Rendering targets
  # ---------------------------------------------------------------------------

  RenderingTargetEnum:
    description: >-
      The downstream rendering formats this graph can be projected into.
      Each target consumes specific subsets of the annotation layers.
    permissible_values:
      rosetta_statement:
        description: >-
          Template-based natural language statement. Consumes: nodes, predicate,
          claim_strength, causal_features (mediation, strength,
          context_dependence), aggregate_certainty_grade where available, and
          rosetta_template annotations on predicates.
      fuzzy_cognitive_map:
        description: >-
          Weighted directed graph for causal modeling. Consumes: nodes, predicate
          sign, fcm_weight, direction, and aggregated edge weights.
      evidence_gap_map:
        description: >-
          Intervention × outcome matrix with evidence counts. Consumes: nodes
          with egm_role annotations, evidence_types, aggregate_certainty_grade,
          and source_document metadata.
      causal_diagram:
        description: >-
          Visual DAG rendering. Consumes: nodes, edges, direction, mediation
          pathways, and predicate sign.
      rag_retrieval:
        description: >-
          Source text retrieval for question answering. Consumes: source_spans,
          source_document, embedding_vector, and semantic metadata on nodes/edges.
      practitioner_summary:
        description: >-
          Plain-language summary for land managers. Consumes: nodes, predicate,
          aggregate_certainty_grade where available, reversibility,
          context_dependence, and agency account annotations.


## =============================================================================
## CLASSES
## =============================================================================

classes:

  # ---------------------------------------------------------------------------
  # Top-level graph container
  # ---------------------------------------------------------------------------

  CausalGraph:
    description: >-
      A labeled property graph of causal claims extracted from scientific
      literature. The top-level container for nodes and edges.
    tree_root: true
    attributes:
      graph_id:
        description: "Unique identifier for this graph or sub-graph."
        range: string
        required: true
        identifier: true
      schema_version:
        description: "Schema version for compatibility tracking."
        range: string
        required: true
        ifabsent: string(0.4.0)
      provenance:
        description: "Provenance metadata for the graph."
        range: GraphProvenance
        required: true
      nodes:
        description: "All causal entities (causes, effects, mediators, moderators)."
        range: CausalNode
        multivalued: true
        inlined_as_list: true
        required: true
      edges:
        description: "All annotated causal relationships."
        range: CausalEdge
        multivalued: true
        inlined_as_list: true
        required: true
      evidence_base_assessments:
        description: >-
          Derived evidence-base-level assessments over sets of article-level
          causal edges. These should be regenerated when new relevant
          CausalEdge records are added.
        range: EvidenceBaseAssessmentEdge
        multivalued: true
        inlined_as_list: true

  GraphProvenance:
    description: "Provenance and metadata for a causal graph."
    attributes:
      ontology_framework:
        description: "Ontology and causal annotation frameworks used by this graph."
        range: string
        ifabsent: string(ELMO + CAMO)
      elm_version:
        description: "Version of the Ecolink Model Ontology entity structure used."
        range: string
      causal_mosaic_version:
        description: "Version of the CAMO annotation framework used."
        range: string
      annotation_guide_version:
        description: "Version of the annotation guide used to create the graph."
        range: string
      created:
        description: "Date and time when the graph metadata was created."
        range: datetime
      source_corpus:
        description: "Description of the annotated corpus or literature set."
        range: string
      annotation_protocol:
        description: "DOI or URL of the annotation protocol document."
        range: uri
      project:
        description: "Project name (e.g., 'EcoWeaver', 'Grassland Systematic Map')."
        range: string

  # ---------------------------------------------------------------------------
  # Nodes
  # ---------------------------------------------------------------------------

  CausalNode:
    description: >-
      A node in the labeled property graph representing a causally active
      ecological entity — specifically, a state or change in state of an
      environmental variable or process. Merges ELMO's entity structure (Alamenciak et al.
      2025) with CAMO's annotation requirements.

      Key design principle: causation in ecology is represented between states
      or changes in state, not between things alone. A taxon does not cause
      anything by itself; the causally relevant annotation concerns the state
      or change of an attribute of a taxon. Therefore each node decomposes into:

        entity  →  what thing (taxon, chemical, abiotic factor, process)
        attribute  →  what measurable property (abundance, cover, rate)
        qualifier  →  whether or how it changed (present, increased, etc.)

      The human-readable 'name' is the composed form: "Increased abundance
      of Canis lupus". The structured fields allow decomposed querying:
      "show me all claims involving Canis lupus" or "all claims about
      abundance changes" or "all claims where abundance decreased."

      This pattern corresponds to ELMO's subject/object value + derivative
      qualifier + state/change qualifier structure.
    attributes:
      id:
        description: >-
          Unique node identifier. This field is populated automatically by the
          annotation tool; annotators do not need to fill it in. If entity_term
          is provided, Loom uses that CURIE; otherwise, Loom generates
          causal_mosaic:{slugified_name}_{4-char-hash}.
        range: uriorcurie
        required: true
        identifier: true
        annotations:
          loom_role: auto_generated
      name:
        description: >-
          Human-readable composed label for the node. Should express the
          full semantic content: "Increased wolf population abundance" or
          "Prescribed burning process" or "Elevated soil nitrogen." This
          is what appears in Rosetta Statements and graph visualizations.
        range: string
        required: true

      ## Node decomposition.
      entity_type:
        description: "High-level category of the ecological entity, for semantic disambiguation."
        range: EntityTypeEnum  # extended from NodeEntityTypeEnum
        annotations:
          note: "Recommended but not required; inferred from entity_term when missing."

      entity_term:
        description: >-
          The core ecological entity as an ontology CURIE. This is the
          "what thing" — the taxon, chemical, abiotic factor, or process
          class, and is the authoritative ontology grounding for the node's
          entity. Corresponds to ELMO's subject_value / object_value slot.
          Examples: WD:18498 (Canis lupus), CHEBI:24279
          (glucosinolate), ENVO:01000253 (grassland). Secondary ontology
          crosswalks, if needed, should be maintained outside article
          annotations in SSSOM files.
        range: uriorcurie
        required: true
        annotations:
          note: >-
            For taxa use Wikidata; for chemicals CHEBI; for environments
            ENVO; for processes GO or ENVO process terms; for qualities PATO.

      measured_attribute:
        description: >-
          The measurable attribute of the entity that participates in the
          causal relationship. Corresponds to ELMO's derivative_qualifier slot.
          Together with entity_term and state_or_change_qualifier, forms the full
          semantic content: "state or change qualifier of attribute of entity."
          This is the authoritative ontology grounding for the measured
          attribute. Use PATO terms for qualities (abundance, density, cover,
          height), GO terms for process rates, or free text if no ontology term
          exists.
        any_of:
          - range: uriorcurie
          - range: string
        annotations:
          examples: >-
            PATO:0000070 (abundance), PATO:0000918 (width),
            PATO:0000574 (density), PATO:0001019 (mass),
            PATO:0000033 (concentration), PATO:0001708 (1-D extent/cover),
            GO:0008150 (biological process for rates)

      state_or_change_qualifier:
        description: >-
          Qualifier indicating the state or change in the attribute, including
          cases where the attribute is present, absent, unchanged, or unspecified.
          Corresponds to ELMO's direction_qualifier slot. Combined with entity_term and
          measured_attribute to produce the node's full meaning:
          e.g., entity=Canis lupus, attribute=abundance,
          qualifier=increased → "increased abundance of Canis lupus."
        range: StateOrChangeQualifierEnum


      ## --- Text Grounding ---

      source_spans:
        description: "Text spans grounding this node in the source document."
        range: TextSpan
        multivalued: true
        inlined_as_list: true

      ## --- RAG support ---
      embedding_text:
        description: >-
          Concatenated text used for generating the embedding vector.
          Typically: name + description + synonym list.
        range: string
        annotation:
          loom_role: hidden
      embedding_vector:
        description: >-
          Pre-computed embedding vector for RAG retrieval. Stored as
          serialized float array. Generated by the indexing pipeline,
          not by annotators.
        range: string
        annotations:
          loom_role: hidden
          note: "Serialized float32 array; decode with numpy/arrow"
      annotator:
        description: "Annotator identifier (human ORCID or model ID)."
        range: string
        annotations:
          loom_role: hidden
  # ---------------------------------------------------------------------------
  # Text grounding
  # ---------------------------------------------------------------------------

  TextSpan:
    description: "A span of text in the source document, for provenance and RAG."
    attributes:
      text:
        description: "Verbatim text."
        range: string
        required: true
      start_char:
        description: "Character offset start in source document."
        range: integer
        annotation:
          loom_role: hidden
      end_char:
        description: "Character offset end."
        range: integer
        annotation:
          loom_role: hidden
      sentence_id:
        description: "Sentence identifier."
        range: string
        annotation:
          loom_role: hidden
      paragraph_id:
        description: "Paragraph identifier."
        range: string
        annotation:
          loom_role: hidden

  # ---------------------------------------------------------------------------
  # Source document (for RAG and EGM)
  # ---------------------------------------------------------------------------

  SourceDocument:
    description: >-
      Bibliographic metadata and study-level context for the source document.
      Supports RAG retrieval, evidence gap map construction, and spatiotemporal
      analysis of the evidence base. Spatial fields enable map-based evidence
      visualization and proximity-weighted retrieval. Temporal fields enable
      tracking of when evidence was collected and whether causal relationships
      vary over time.
    attributes:
      doi:
        description: "Digital Object Identifier for the source document."
        range: string
      pmid:
        description: "PubMed identifier for the source document."
        range: string
      title:
        description: "Title of the source document."
        range: string
      authors:
        description: "Authors of the source document."
        range: string
        multivalued: true
      year:
        range: integer
        description: "Publication year."
      journal:
        description: "Journal or publication venue for the source document."
        range: string

      ## --- Spatial context ---
      study_coordinates:
        description: >-
          Coordinate set or sets reported for the study. Use one entry per
          reported centroid or bounded study area. This supports multi-site
          studies without requiring site names that the source may not report.
          Coordinates enable map-based evidence gap maps, proximity-weighted
          retrieval ("show me evidence from sites near mine"), and spatial
          analysis of where causal relationships have been tested.
        range: StudyCoordinates
        multivalued: true
        inlined_as_list: true
      study_country:
        description: >-
          Country or countries where the study was conducted. Use country
          names or ISO 3166-1 alpha-2 codes where practical. If multiple
          countries are reported, separate them with semicolons.
        range: string
      study_state_or_province:
        description: >-
          State, province, territory, or comparable administrative region
          where the study was conducted. If multiple regions are reported,
          separate them with semicolons.
        range: string

      ## --- Temporal context ---

      study_period_start:
        description: >-
          Start date of data collection. Not the publication date — when
          the fieldwork or measurements actually began. ISO 8601 format.
          Can be year-only (2015), year-month (2015-06), or full date
          (2015-06-15). For paleontological or historical ecology studies,
          use negative years or descriptive text in study_temporal_note.
        range: string
        annotations:
          format: "ISO 8601 (YYYY, YYYY-MM, or YYYY-MM-DD)"
          examples: "2015, 2015-06, 2015-06-15"
      study_period_end:
        description: >-
          End date of data collection. Same format as study_period_start.
        range: string
        annotations:
          format: "ISO 8601 (YYYY, YYYY-MM, or YYYY-MM-DD)"
      study_duration_months:
        description: >-
          Duration of the study in months. Computed from start/end if
          both are provided, or entered directly if the paper reports
          duration without specific dates. Useful for filtering: "show
          me only studies with at least 24 months of monitoring."
        range: float
        annotation:
          loom_role: calculated
      study_temporal_note:
        description: >-
          Free-text note for temporal context that doesn't fit structured
          fields. E.g., "data collected over three growing seasons",
          "historical records from 1850-1950", "pollen core spanning
          6,700 years."
        range: string

      ## --- Ecological context ---

      study_design:
        description: "Study design classification for EGM quality assessment."
        range: EvidenceTypeEnum
      study_sample_size:
        description: >-
          Sample size or replication level reported in the study.
          Free text: "n = 12 plots per treatment", "47 studies", "182 survey respondents."
        range: string

  StudyCoordinates:
    description: >-
      Structured coordinate representation for a study location. At minimum,
      provide latitude and longitude as a centroid when coordinates are
      reported. Optionally provide a bounding box for larger study areas and
      elevation. Coordinates should be in WGS 84 (EPSG:4326), which is what
      GPS devices and most ecology papers report.
    attributes:
      latitude:
        description: >-
          Latitude of the study coordinate centroid in decimal degrees (WGS 84).
          Positive = North, negative = South. E.g., 43.2642 for southern
          Ontario.
        range: float
        minimum_value: -90.0
        maximum_value: 90.0
      longitude:
        description: >-
          Longitude of the study coordinate centroid in decimal degrees (WGS 84).
          Positive = East, negative = West. E.g., -81.7567 for southern
          Ontario.
        range: float
        minimum_value: -180.0
        maximum_value: 180.0
      elevation_m:
        description: >-
          Elevation of the coordinate location in metres above sea level, if
          reported. Useful for montane and altitudinal gradient studies.
        range: float
      coordinate_uncertainty_m:
        description: >-
          Uncertainty radius in metres around the centroid coordinates.
          If the paper reports coordinates to the nearest minute (~1850m)
          vs. second (~30m) vs. high-precision GPS (~5m), this field
          captures that. Follows Darwin Core dwc:coordinateUncertaintyInMeters.
        range: float
      bbox_north:
        description: "Northern boundary of study area bounding box (decimal degrees)."
        range: float
        annotations:
          loom_role: collapse
      bbox_south:
        description: "Southern boundary of study area bounding box (decimal degrees)."
        range: float
        annotations:
          loom_role: collapse
      bbox_east:
        description: "Eastern boundary of study area bounding box (decimal degrees)."
        range: float
        annotations:
          loom_role: collapse
      bbox_west:
        description: "Western boundary of study area bounding box (decimal degrees)."
        range: float
        annotations:
          loom_role: collapse

  TemporalExtent:
    description: >-
      The temporal window over which a causal effect was observed or
      measured. Distinct from the study period (when was fieldwork done):
      this captures the timescale of the causal relationship itself.
      For example, a study conducted from 2015-2020 might report that
      invasive removal led to native recovery "within three growing
      seasons" — the study period is 5 years, but the temporal extent
      of the causal effect is 3 growing seasons (~18 months).
      
      This is important for practitioners who need to know how long
      to wait for results, and for meta-analysts investigating whether
      effect sizes vary with observation duration.
    attributes:
      duration_months:
        description: >-
          Duration of the observed causal effect in months. E.g., 36
          for "within three years", 6 for "one growing season."
        range: float
      duration_text:
        description: >-
          Free-text description of the temporal extent as stated in the
          source. E.g., "within three growing seasons", "over a 20-year
          period", "immediately following treatment."
        range: string
      lag_months:
        description: >-
          Time lag between the cause and the onset of the effect, in
          months. E.g., if invasive removal happens in year 0 and
          native recovery begins in year 2, lag = 24. Null if the
          effect is immediate or lag is not reported.
        range: float
      observation_grain:
        description: >-
          The temporal grain at which the effect was measured. E.g.,
          "daily", "monthly", "seasonal", "annual", "decadal." Affects
          interpretability — a relationship detected at annual grain
          may not hold at daily grain.
        range: string
        annotations:
          examples: "daily, weekly, monthly, seasonal, annual, decadal, centennial"
      observation_seasons:
        description: >-
          Seasons during which the effect was observed, if seasonally
          restricted. E.g., ["spring", "summer"] for a growing-season
          study. Important for context-dependent effects that may not
          hold year-round.
        range: string
        multivalued: true

  # ---------------------------------------------------------------------------
  # Edges — the core annotation unit
  # ---------------------------------------------------------------------------

  CausalEdge:
    description: >-
      An edge in the labeled property graph representing a causal relationship.
      Carries all four annotation layers as properties:
        Layer 1: Claim strength and linguistic expression
        Layer 2: Philosophical account classification
        Layer 3: Fifteen causal features
        Layer 4: Evidential basis
      Plus rendering metadata for each downstream target.
    attributes:
      id:
        description: "Unique edge identifier."
        range: string
        required: true
        identifier: true
        annotations:
          loom_role: auto-generated
      subject:
        description: "Node ID of the cause entity."
        range: CausalNode
        required: true
      predicate:
        description: "Edge type from controlled vocabulary."
        range: CausalPredicateEnum
        required: true
      object:
        description: "Node ID of the effect entity."
        range: CausalNode
        required: true
      negated:
        description: "True if the claim is that the relationship does NOT hold."
        range: boolean
        ifabsent: boolean(false)

      ## ---- Layer 1: Claim Strength & Context ----

      claim_strength:
        description: "How strong is the causal language used?"
        range: ClaimStrengthEnum
        required: true
      original_sentence:
        description: >-
          The full original sentence(s) from which this edge was extracted.
          Preserved for RAG retrieval and rendering validation.
        range: string
      ecosystem_context:
        description: >-
          The IUCN Global Ecosystem Typology Level 3 ecosystem functional
          group in which this causal relationship was observed, represented by
          an ELMO ecosystem type term. Use this edge-level field for the
          ecosystem setting of the causal claim.
        range: EcosystemFunctionalGroupEnum
        annotations:
          elm_correspondence: ecosystem_context_qualifier
          examples: "temperate_subhumid_grasslands, seagrass_meadows"


      ## ---- Layer 2: Philosophical Account ----
      
      philosophical_accounts:
        description: >-
          Which philosophical account(s) of causation does this claim invoke?
          A claim may invoke multiple accounts simultaneously.
        range: PhilosophicalAccountEnum
        multivalued: true
        required: true

      ## ---- Layer 3: Causal Features (15 features) ----

      necessity:
        description: "Whether the cause is characterized as necessary for the effect."
        range: FeatureAssertionEnum
        ifabsent: string(not_addressed)
        slot_uri: camo:necessity
      sufficiency:
        description: "Whether the cause is characterized as sufficient for the effect."
        range: FeatureAssertionEnum
        ifabsent: string(not_addressed)
        slot_uri: camo:sufficiency
      direction:
        description: "Annotation of causal direction and evidence for direction."
        range: DirectionAnnotation
        inlined: true
        slot_uri: camo:direction
      temporal_ordering:
        description: "Whether temporal ordering between cause and effect is addressed."
        range: FeatureAssertionEnum
        ifabsent: string(not_addressed)
        slot_uri: camo:temporal_ordering
      mediation:
        description: "Annotation of any mediating pathway between cause and effect."
        range: MediationAnnotation
        inlined: true
        slot_uri: camo:mediation
      moderation:
        description: "Annotation of any moderator or effect modifier for the causal relationship."
        range: ModerationAnnotation
        inlined: true
        slot_uri: camo:moderation
      strength:
        description: "Annotation of the reported strength or magnitude of the causal relationship."
        range: StrengthAnnotation
        inlined: true
        slot_uri: camo:strength
      specificity:
        description: "Whether the causal relationship is characterized as specific to particular causes or effects."
        range: FeatureAssertionEnum
        ifabsent: string(not_addressed)
        slot_uri: camo:specificity
      stability:
        description: "Whether the causal relationship is characterized as stable across contexts or conditions."
        range: FeatureAssertionEnum
        ifabsent: string(not_addressed)
        slot_uri: camo:stability
      token_or_type:
        description: "Whether the claim concerns a specific causal instance or a general causal type."
        range: TokenTypeEnum
        ifabsent: string(not_addressed)
        slot_uri: camo:token_or_type
      determinism:
        description: "Whether the causal relationship frames the underlying process as deterministic or indeterministic, or uses probability only to express epistemic uncertainty."
        range: DeterminismEnum
        ifabsent: string(not_addressed)
        slot_uri: camo:determinism
      proximate_distal:
        description: "Whether the cause is positioned as proximate, distal, or both."
        range: ProximateDistalEnum
        ifabsent: string(not_addressed)
        slot_uri: camo:proximate_distal
      contributing_sole:
        description: "Whether the cause is presented as a sole cause or contributing cause."
        range: ContributingSoleEnum
        ifabsent: string(not_addressed)
        slot_uri: camo:contributing_sole
      reversibility:
        description: "Whether removing the cause is characterized as reversing the effect."
        range: ReversibilityEnum
        ifabsent: string(not_addressed)
        slot_uri: camo:reversibility
      proportionality:
        description: "Whether the cause is characterized at a proportional level of specificity."
        range: FeatureAssertionEnum
        ifabsent: string(not_addressed)
        slot_uri: camo:proportionality
      context_dependence:
        description: "Annotation of scope conditions or context dependence for the causal relationship."
        range: ContextAnnotation
        inlined: true

      ## ---- Layer 4: Evidential Basis ----

      evidential_basis:
        description: "Annotation of the evidence type and evidence object supporting the claim."
        range: EvidentialBasis
        inlined: true

      ## ---- FCM / Causal Modeling support ----

      fcm_weight:
        description: >-
          Numeric edge weight for Fuzzy Cognitive Map rendering. Range: -1.0
          (strong negative) to +1.0 (strong positive). Derived from predicate
          sign, claim_strength, and strength annotation. Can be overridden
          by expert elicitation.
        range: float
        minimum_value: -1.0
        maximum_value: 1.0
        annotations:
          loom_role: hidden
      fcm_weight_source:
        description: "How the FCM weight was determined."
        range: string
        annotations:
          examples: "derived_from_schema, expert_elicitation, meta_analysis_effect_size"
          loom_role: hidden

      ## ---- Spatiotemporal Extent of the Causal Effect ----

      temporal_extent:
        description: >-
          The temporal window over which this causal effect was observed.
          Distinct from the study period in source_document (when fieldwork
          was done): this captures the timescale of the causal relationship
          itself. E.g., "native recovery occurred within three growing
          seasons of invasive removal." Enables filtering by effect
          duration and analysis of whether effect sizes vary with
          observation window.
        range: TemporalExtent
        inlined: true

      ## ---- Provenance ----

      source_spans:
        description: "Text spans grounding this edge."
        range: TextSpan
        multivalued: true
        inlined_as_list: true
        required: true
      source_document:
        description: "Bibliographic and study-level metadata for the source document."
        range: SourceDocument
        inlined: true
      annotator:
        description: "Annotator identifier (human ORCID or model ID)."
        range: string
      annotation_confidence:
        description: "Annotator confidence in the overall annotation, 0.0-1.0."
        range: float
        minimum_value: 0.0
        maximum_value: 1.0
      annotation_timestamp:
        description: "Date and time when the edge annotation was created."
        range: datetime
      annotation_notes:
        description: "Free-text notes from the annotator about this edge."
        range: string

  EvidenceBaseAssessmentEdge:
    description: >-
      A derived evidence-base-level assessment for a causal relationship,
      computed or curated from multiple article-level CausalEdge records that
      refer to the same or comparable subject-predicate-object relationship.
      This class is intended for synthesis and graph analysis, not for
      per-article annotation. It can be regenerated when the evidence base
      changes, reducing annotator effort by avoiding repeated aggregate
      judgments such as Russo-Williamson satisfaction on every article-level
      edge.
    attributes:
      id:
        description: "Unique identifier for this evidence-base assessment edge."
        range: string
        required: true
        identifier: true
      subject:
        description: "Canonical cause node being assessed."
        range: CausalNode
        required: true
      predicate:
        description: "Aggregate causal predicate being assessed."
        range: CausalPredicateEnum
        required: true
      object:
        description: "Canonical effect node being assessed."
        range: CausalNode
        required: true

      ## ---- Evidence set membership ----

      included_edge_ids:
        description: >-
          Article-level CausalEdge identifiers included in this aggregate
          assessment.
        range: string
        multivalued: true
      excluded_edge_ids:
        description: >-
          Article-level CausalEdge identifiers reviewed but excluded from this
          aggregate assessment.
        range: string
        multivalued: true
      inclusion_criteria:
        description: >-
          Criteria used to decide which article-level edges belong in this
          aggregate assessment.
        range: string
      exclusion_rationale:
        description: "Free-text rationale for exclusions, if any."
        range: string

      ## ---- Aggregate evidence characterization ----

      evidence_types:
        description: "Evidence types represented across the included edges."
        range: EvidenceTypeEnum
        multivalued: true
      evidence_objects:
        description: >-
          Evidence objects represented across the included edges: correlation,
          mechanism, or both.
        range: EvidenceObjectEnum
        multivalued: true
      has_difference_making_evidence:
        description: >-
          Aggregate assessment of whether the evidence base contains
          difference-making evidence for the relationship.
        range: AssessmentStatusEnum
        ifabsent: string(not_assessed)
      has_production_evidence:
        description: >-
          Aggregate assessment of whether the evidence base contains production
          or mechanistic evidence for the relationship.
        range: AssessmentStatusEnum
        ifabsent: string(not_assessed)
      russo_williamson_satisfied:
        description: >-
          Aggregate assessment of whether the evidence base satisfies the
          Russo-Williamson requirement for both difference-making and production
          evidence.
        range: AssessmentStatusEnum
        ifabsent: string(not_assessed)
      russo_williamson_rationale:
        description: "Rationale for the aggregate Russo-Williamson assessment."
        range: string
      bradford_hill_viewpoints:
        description: >-
          Bradford Hill viewpoints supported by the aggregated evidence base.
          Some viewpoints require qualitative judgment and may not be fully
          programmatically reassessable each time article-level causal edges
          change.
        range: BradfordHillViewpointEnum
        multivalued: true
      bradford_hill_count:
        description: "Count of Bradford Hill viewpoints supported by the aggregated evidence base."
        range: integer
        minimum_value: 0
        maximum_value: 9
      evidence_balance:
        description: "Overall balance of the included evidence."
        range: EvidenceBalanceEnum
        ifabsent: string(not_assessed)
      aggregate_certainty_grade:
        description: "Certainty grade assigned to the aggregate evidence-base assessment."
        range: CertaintyGradeEnum
        ifabsent: string(not_assessed)
      aggregate_certainty_rationale:
        description: "Rationale for the aggregate certainty grade."
        range: string
      conflict_summary:
        description: "Summary of important conflicts or heterogeneity across included studies."
        range: string
      context_dependence_summary:
        description: "Summary of contexts or scope conditions that affect the aggregate relationship."
        range: string

      ## ---- Evidence quantity and study composition ----

      number_of_studies:
        description: "Number of distinct source studies represented in the included edges."
        range: integer
        minimum_value: 0
      number_of_supporting_edges:
        description: "Number of included article-level edges supporting the relationship."
        range: integer
        minimum_value: 0
      number_of_contradicting_edges:
        description: "Number of included article-level edges contradicting the relationship."
        range: integer
        minimum_value: 0
      number_of_experimental_studies:
        description: "Number of included studies using randomized, quasi-, or natural experimental designs."
        range: integer
        minimum_value: 0
      number_of_observational_studies:
        description: "Number of included observational studies."
        range: integer
        minimum_value: 0
      number_of_mechanistic_studies:
        description: "Number of included studies providing mechanistic or production evidence."
        range: integer
        minimum_value: 0

      ## ---- Aggregate effect summary ----

      aggregate_effect_sign:
        description: "Aggregate direction/sign of the effect, if assessed."
        range: string
        annotations:
          examples: "positive, negative, mixed, neutral, unknown"
      aggregate_effect_size:
        description: "Aggregate effect size or summary statistic, if available."
        range: string
      effect_size_metric:
        description: "Metric used for the aggregate effect size."
        range: string
        annotations:
          examples: "risk ratio, odds ratio, standardized mean difference, correlation coefficient"
      effect_size_summary_method:
        description: "Method used to summarize effect sizes across studies."
        range: string
        annotations:
          examples: "meta_analysis, vote_counting, narrative_synthesis, expert_assessment"
      heterogeneity:
        description: "Heterogeneity statistic or qualitative heterogeneity summary."
        range: string

      ## ---- Assessment provenance and refresh metadata ----

      assessment_method:
        description: "Method used to generate the evidence-base assessment."
        range: string
        annotations:
          examples: "automated_rule, narrative_synthesis, systematic_review, meta_analysis, expert_review"
      assessment_version:
        description: "Version of the assessment method or ruleset."
        range: string
      assessed_by:
        description: "Identifier for the person, model, or workflow that generated the assessment."
        range: string
      assessment_timestamp:
        description: "Date and time when the aggregate assessment was generated."
        range: datetime
      last_refreshed_at:
        description: "Date and time when the aggregate assessment was last refreshed."
        range: datetime
      needs_refresh:
        description: >-
          True when new relevant article-level CausalEdge records have been
          added or changed since this assessment was last generated.
        range: boolean
        ifabsent: boolean(false)
      refresh_reason:
        description: "Reason the assessment needs to be refreshed, if applicable."
        range: string
      assessment_notes:
        description: "Free-text notes about the aggregate assessment."
        range: string
      evidential_basis:
        description: >-
          Aggregate evidence type and object characterization across included edges.
          Computed from the `evidence_types` and `evidence_objects` of member article-level edges.
        range: EvidentialBasis
        inlined: true

  # ---------------------------------------------------------------------------
  # Feature sub-structures (inlined in CausalEdge)
  # ---------------------------------------------------------------------------

  DirectionAnnotation:
    description: "Direction and asymmetry of the causal relationship."
    attributes:
      status:
        description: "Assertion status for the direction annotation."
        range: DirectionStatusEnum
        ifabsent: string(not_addressed)
      evidence_for_direction:
        description: "Evidence used to establish the direction of causation."
        range: DirectionEvidenceEnum

  MediationAnnotation:
    description: "Whether a mediating pathway is identified between cause and effect."
    attributes:
      status:
        description: "Assertion status for the mediation annotation."
        range: FeatureAssertionEnum
        ifabsent: string(not_addressed)
      mediator_node_ids:
        description: >-
          Node IDs of mediating entities. These should also appear as separate
          nodes in the graph with their own edges.
        range: uriorcurie
        multivalued: true
      pathway_description:
        description: "Free-text description of the mediating pathway."
        range: string

  ModerationAnnotation:
    description: "Whether effect modification by a third variable is noted."
    attributes:
      status:
        description: "Assertion status for the moderation annotation."
        range: FeatureAssertionEnum
        ifabsent: string(not_addressed)
      moderator_node_ids:
        description: "Node IDs of moderating entities."
        range: uriorcurie
        multivalued: true
      interaction_type:
        description: "Type of interaction or effect modification described."
        range: InteractionTypeEnum

  StrengthAnnotation:
    description: "Effect size, magnitude, or dose-response characterization."
    attributes:
      status:
        description: "Assertion status for the strength annotation."
        range: FeatureAssertionEnum
        ifabsent: string(not_addressed)
      quantitative_value:
        description: "Effect size as reported: 'RR = 2.0', 'd = 0.8', '60% reduction'."
        range: string
      quantitative_numeric:
        description: >-
          Numeric value extracted for computation (e.g., FCM weight derivation).
          Use the primary effect size; specify the metric in quantitative_value.
        range: float
      qualitative_descriptor:
        description: "Qualitative descriptor of the causal relationship strength."
        range: StrengthQualitativeEnum
      dose_response:
        description: "Is a dose-response or gradient relationship described?"
        range: boolean
        ifabsent: boolean(false)

  ContextAnnotation:
    description: "Scope conditions or enabling conditions for the causal relationship."
    attributes:
      status:
        description: "Assertion status for the context annotation."
        range: FeatureAssertionEnum
        ifabsent: string(not_addressed)
      scope_conditions:
        description: >-
          Named conditions under which the relationship holds. E.g., 'in acidic
          soils', 'at elevations above 2000m', 'in temperate grasslands'.
        any_of:
          - range: uriorcurie
          - range: string
        multivalued: true
      geographic_scope:
        description: "Geographic scope of the claim."
        range: string
      temporal_scope:
        description: "Temporal scope of the claim."
        range: string
      ecosystem_scope:
        description: "Ecosystem type scope, ideally mapped to IUCN GET."
        range: string

  # ---------------------------------------------------------------------------
  # Evidential Basis (Layer 4)
  # ---------------------------------------------------------------------------

  EvidentialBasis:
    description: >-
      Operationalizes Illari's type/object distinction and the Russo-Williamson
      Thesis at the article-annotation level. Tracks what kinds of evidence an
      individual source provides; aggregate criteria are assessed on
      EvidenceBaseAssessmentEdge.
    attributes:
      evidence_types:
        description: "TYPE of evidence: what kind of study or reasoning."
        range: EvidenceTypeEnum
        multivalued: true
      evidence_objects:
        description: >-
          OBJECT of evidence: whether it supports correlation, mechanism, or
          both. Per the Russo-Williamson Thesis.
        range: EvidenceObjectEnum
        multivalued: true
